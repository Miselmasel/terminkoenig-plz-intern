<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminkönig PLZ Karte</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="map"></div>
<div id="sb">
  <h2>
    <img src="terminkoenig_logo.png" alt="Terminkönig" style="height:26px;display:block;margin:0 auto;">
    <div style="font-size:12px;font-weight:bold;margin-top:4px;">PLZ-Karte</div>
  </h2>

  <div class="s">
    <div class="tr">
      <h3 style="margin:0">AUSWAHL</h3>
    </div>
    <div style="font-size:11px;color:#666;margin-top:4px;">
      Klick auf Gebiet = markieren / abwählen
    </div>
  </div>

  <div class="s">
    <div style="display:flex;gap:4px;">
      <button class="bk" id="blToggleBtn" onclick="toggleBundeslaender()" style="flex:1;margin:0;">Bundesländer</button>
      <button class="bk" id="lkToggleBtn" onclick="toggleLandkreise()" style="flex:1;margin:0;">Landkreise</button>
    </div>
  </div>

  <div class="s">
    <button class="bk" id="pkToggleBtn" onclick="togglePreisklassen()" style="margin-bottom:8px;">Preisklassen anzeigen</button>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px 6px;">
      <div class="lr"><span class="ld" style="background:#e74c3c"></span> Preisklasse 3</div>
      <div class="lr"><span class="ld" style="background:#2ecc71"></span> Preisklasse 1</div>
      <div class="lr"><span class="ld" style="background:#f39c12"></span> Preisklasse 2</div>
      <div class="lr"><span class="ld" style="background:#642d7b"></span> Nicht buchbar</div>
    </div>
  </div>

  <div class="s">
    <div style="display:flex;align-items:center;gap:4px;">
      <input type="text" id="si" placeholder="PLZ suchen" maxlength="5" style="flex:1;min-width:0;width:auto;margin:0;">
      <button class="bb" onclick="zen()" style="width:auto;margin:0;padding:5px 8px;white-space:nowrap;">Suche</button>
    </div>
  </div>

  <div class="s">
    <div style="display:flex;align-items:center;gap:4px;margin-bottom:4px;">
      <h3 style="margin:0;flex-shrink:0;">UMKREISSUCHE</h3>
      <select id="mrs" style="flex:1;min-width:0;margin:0;padding:3px 2px;font-size:11px;">
        <option>10 km</option>
        <option>20 km</option>
        <option selected>30 km</option>
        <option>40 km</option>
        <option>50 km</option>
        <option>75 km</option>
        <option>100 km</option>
      </select>
      <button class="bg" onclick="multiUmkreis()" style="width:auto;margin:0;padding:4px 6px;white-space:nowrap;font-size:11px;">Suche</button>
      <button class="br" onclick="multiUmkreisLoeschen()" style="width:auto;margin:0;padding:4px 6px;white-space:nowrap;font-size:11px;">Reset</button>
    </div>
    <div style="font-size:11px;color:#666;margin-bottom:4px;">per Klick gesetzte PLZ</div>
    <div style="display:flex;align-items:center;gap:4px;margin-bottom:3px;">
      <button class="bk" id="mpToggleBtn" onclick="toggleMultiMode()" style="flex:1;margin:0;white-space:nowrap;">Klick setzen</button>
      <span style="font-size:11px;white-space:nowrap;">Punkte (<span id="mpCount">0</span>/5)</span>
    </div>
    <div id="mpList" style="font-size:11px;max-height:55px;overflow-y:auto;margin:2px 0;"></div>
  </div>

  <div class="s">
    <h3 id="ac"><span>AUSWAHL (</span><span>0</span><span>)</span></h3>
    <div id="al"></div>
  </div>

  <div class="s">
    <h3>TEXTAUSGABE</h3>
    <div id="ta" class="ta"></div>
    <button class="bb" onclick="exportCSV()">Export CSV</button>
    <button class="br" onclick="auswahlLoeschen()">Auswahl loeschen</button>
  </div>

  <div class="s">
    <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:8px;">
      <span style="font-size:11px;font-weight:bold;color:#333;">Auswahl per E-Mail an:</span>
      <img src="terminkoenig_logo.png" alt="Terminkönig" style="height:14px;vertical-align:middle;">
      <span style="font-size:11px;font-weight:bold;color:#333;">senden</span>
    </div>
    <div style="display:flex;gap:4px;margin-bottom:8px;">
      <button id="tabInteressent" class="fm-tab fm-tab-active" onclick="switchFmTab('interessent')">Interessent</button>
      <button id="tabKunde" class="fm-tab" onclick="switchFmTab('kunde')">Kunde</button>
    </div>
    <div id="fmInteressent" style="display:flex;flex-direction:column;gap:4px;">
      <input type="text" id="fmVorname" placeholder="Vorname *" maxlength="50" style="margin:0;">
      <input type="text" id="fmNachname" placeholder="Nachname *" maxlength="50" style="margin:0;">
      <input type="email" id="fmEmail" placeholder="E-Mail-Adresse *" maxlength="100" style="margin:0;">
      <input type="tel" id="fmTelefon" placeholder="Telefon (optional)" maxlength="30" style="margin:0;">
    </div>
    <div id="fmKundeSection" style="display:none;flex-direction:column;gap:4px;">
      <input type="text" id="fmKundennummer" placeholder="Kundennummer *" maxlength="30" style="margin:0;">
      <input type="text" id="fmVertragsnummer" placeholder="Vertragsnummer *" maxlength="30" style="margin:0;">
    </div>
    <input type="text" id="fmEigenePlz" placeholder="Eigene PLZ – Entfernung berechnen (optional)" maxlength="5" style="margin-top:4px;margin-bottom:0;" oninput="this.value=this.value.replace(/\D/g,'').substring(0,5);updateEigenePlzMarker();">
    <button class="bb" onclick="submitFormular()" style="margin-top:6px;" id="fmSendBtn">Auswahl senden</button>
    <div id="fmStatus" style="font-size:11px;margin-top:4px;min-height:16px;"></div>
  </div>

  <div class="s">
    <h3>FEIERTAGE</h3>
    <div id="cal"></div>
  </div>

  <div id="legal-footer">
    <button class="legal-btn" onclick="showLegal('impressum')">Impressum</button>
    <span class="legal-sep">·</span>
    <button class="legal-btn" onclick="showLegal('disclaimer')">Nutzungshinweis</button>
    <span class="legal-sep">·</span>
    <button class="legal-btn" onclick="showLegal('quellen')">Quellen</button>
  </div>
</div>

<div id="legal-overlay" onclick="closeLegal()">
  <div id="legal-box" onclick="event.stopPropagation()">
    <button id="legal-close" onclick="closeLegal()">✕</button>
    <div id="legal-content"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<script src="script.js"></script>
</body>
</html>
